<!DOCTYPE html>
<html>

<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>

<body class="body">
  <header class="header">
    <figure>
      <img class="header__img" src="./eisenhower-matrix.jpg" alt="logo">
    </figure>
    <a class="header__more" href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </header>

  <main class="main">
    <form class="add-item">
      <label for="new-task" class="new-task">Add Item</label>
      <div class="new-task__wrapper">
        <input id="new-task" type="text" class="field">
        <button class="btn-add">Add</button>
      </div>
    </form>

    <section class="todo-container hidden">
      <h3>Todo</h3>
      <form class="item">
        <input type="checkbox" class="checkbox">
        <label class="task">Pay Bills</label>
        <input type="text" class="field">
        <button class="edit">Edit</button>
        <button class="delete">
          <img class="delete__img" src="./remove.svg" alt="delet button">
        </button>
      </form>
      <form class="edit-mode item">
        <input type="checkbox" class="checkbox">
        <label class="task">Go Shopping</label>
        <input type="text" value="Go Shopping" class="field input-size">
        <button class="edit">Save</button>
        <button class="delete">
          <img class="delete__img" src="./remove.svg" alt="delet button">
        </button>
      </form>
    </section>

    <section class="completed hidden">
      <h3>Completed</h3>
      <form class="item">
        <input type="checkbox" class="checkbox" checked>
        <label class="task">See the Doctor</label>
        <input type="text" class="field">
        <button class="edit">Edit</button>
        <button class="delete">
          <img class="delete__img" src="./remove.svg" alt="delet button">
        </button>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>

</html>
