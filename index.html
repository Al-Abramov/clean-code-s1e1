<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
          rel="stylesheet">
    <link rel="stylesheet" href="style.css" 
          media="screen" charset="utf-8">
  </head>
  <body class="body">
    <div class="header">
      <img class="header__img" src="./eisenhower-matrix.jpg">
      <a class="more" 
         href="https://goal-life.com/page/method/matrix-eisenhower">
         Want more details?
      </a>
    </div>

    <div class="main">
      <p id="add-item">
        <label for="new-task" class="new-task">Add Item</label>
        <input id="new-task" type="text" class="field">
        <button class="btn-add">Add</button>
      </p>
      <h3>Todo</h3>
      <ul id="todo" class="hidden">
        <li class="item">
          <input type="checkbox" class="checkbox">
          <label class="task">Pay Bills</label>
          <input type="text" class="field">
          <button class="edit">Edit</button>
          <button class="delete">
            <img class="delete__img" src="./remove.svg">
          </button>
        </li>
        <li class="edit-mode item">
          <input type="checkbox" class="checkbox">
          <label class="task">Go Shopping</label>
          <input type="text" value="Go Shopping" class="field input-size">
          <button class="edit">Save</button>
          <button class="delete">
            <img class="delete__img" src="./remove.svg">
          </button>
        </li>
      </ul>
      <h3>Completed</h3>
      <ul id="completed" class="hidden">
        <li class="item">
          <input type="checkbox" class="checkbox" checked>
          <label class="task">See the Doctor</label>
          <input type="text" class="field">
          <button class="edit">Edit</button>
          <button class="delete">
            <img class="delete__img" src="./remove.svg">
          </button>
        </li>
      </ul>
    </div>
    <script src="app.js"></script>
  </body>
</html>
